<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#2563eb">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Nodecal">
  <title>Nodecal</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon.svg">
  <link rel="stylesheet" href="/client/styles/main.css">
  <link rel="stylesheet" href="/client/styles/views.css">
  <link rel="stylesheet" href="/client/styles/month.css">
  <link rel="stylesheet" href="/client/styles/tasks.css">
  <!-- Apply saved theme before first paint to avoid flash -->
  <script>
    (function () {
      var t = localStorage.getItem('nc-theme');
      if (t === 'dark' || t === 'light') document.documentElement.dataset.theme = t;
    })();
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js');
    }
  </script>
</head>
<body>
  <div id="login-overlay" class="login-overlay hidden">
    <div class="login-card">
      <h1>Nodecal</h1>
      <form id="login-form" autocomplete="on">
        <input type="text" name="username" id="login-username" value="nodecal" autocomplete="username" style="display:none" aria-hidden="true">
        <div class="modal-field">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" name="password" autocomplete="current-password" placeholder="Enter password">
        </div>
        <div id="login-error" class="login-error hidden">Wrong password — try again</div>
        <button type="submit" class="btn btn-primary" style="width:100%">Sign in</button>
      </form>
    </div>
  </div>

  <div id="app">
    <header class="app-header">
      <button class="icon-btn" id="cal-btn" title="Calendars">☰</button>
      <h1 id="header-title">Nodecal</h1>
      <div class="header-right">
        <button class="icon-btn" id="theme-btn" title="Toggle theme">◐</button>
        <button class="icon-btn" id="settings-btn" title="Settings">⚙</button>
        <button class="icon-btn sync-btn" id="sync-btn" title="Sync">↻</button>
      </div>
    </header>

    <div id="sync-error" class="sync-error hidden"></div>

    <main id="view-container"></main>

    <div id="cal-quickadd" class="cal-quickadd hidden">
      <input type="text" id="cal-quickadd-input" class="cal-quickadd-input" placeholder="Add event… e.g. Meeting tomorrow 14:00" autocomplete="off" spellcheck="false">
      <button class="cal-quickadd-btn" id="cal-quickadd-submit" aria-label="Add">↵</button>
    </div>

    <nav class="bottom-nav" id="bottom-nav"></nav>

    <button class="fab" id="fab" title="New event">+</button>

    <div id="modal-overlay" class="modal-overlay hidden">
      <div class="modal-sheet"></div>
    </div>

    <div id="cal-drawer-overlay" class="cal-drawer-overlay hidden">
      <div class="cal-drawer">
        <h2>Calendars</h2>
        <div id="cal-list"></div>
      </div>
    </div>

    <div id="settings-overlay" class="modal-overlay hidden">
      <div class="modal-sheet"></div>
    </div>

    <div id="install-banner" class="install-banner hidden">
      <span class="install-text">Add Nodecal to your home screen</span>
      <button id="install-btn" class="btn btn-primary">Install</button>
      <button id="install-dismiss" class="btn btn-ghost">✕</button>
    </div>
  </div>

  <script type="module" src="/client/app/main.js"></script>
</body>
</html>
