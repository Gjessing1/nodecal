<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Nodecal</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/client/styles/main.css">
  <link rel="stylesheet" href="/client/styles/views.css">
</head>
<body>
  <div id="app">
    <header class="app-header">
      <button class="icon-btn" id="cal-btn" title="Calendars">☰</button>
      <h1 id="header-title">Nodecal</h1>
      <button class="icon-btn sync-btn" id="sync-btn" title="Sync">↻</button>
    </header>

    <div id="sync-error" class="sync-error hidden"></div>

    <main id="view-container"></main>

    <nav class="bottom-nav">
      <button class="nav-btn active" data-view="agenda">
        <span class="nav-icon">≡</span>
        <span>Agenda</span>
      </button>
      <button class="nav-btn" data-view="day">
        <span class="nav-icon">▭</span>
        <span>Day</span>
      </button>
      <button class="nav-btn" data-view="week">
        <span class="nav-icon">⊞</span>
        <span>Week</span>
      </button>
    </nav>

    <button class="fab" id="fab" title="New event">+</button>

    <div id="modal-overlay" class="modal-overlay hidden">
      <div class="modal-sheet"></div>
    </div>

    <div id="cal-drawer-overlay" class="cal-drawer-overlay hidden">
      <div class="cal-drawer">
        <h2>Calendars</h2>
        <div id="cal-list"></div>
      </div>
    </div>
  </div>

  <script type="module" src="/client/app/main.js"></script>
</body>
</html>
